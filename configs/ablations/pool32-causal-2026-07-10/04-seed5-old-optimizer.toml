extends = "../../bases/gated-pool32-legacy-screen.toml"

# Seed 5 interactions with clip 3 and batch 512 failed; test the historical
# optimizer and schedule while retaining batch 256 and clip 1.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5

[wandb]
run_name = "pool32-causal-seed5-old-optimizer-1"

[paths]
run_dir = "runs/pool32-causal-seed5-old-optimizer-1"
