extends = "../../bases/benchmark-throughput-r8-screen.toml"

# B+C: WhittleZero search/trainer with the generic model.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
batch = 512
value_batch = 256
value_window_rows = 5000
grad_clip = 3.0
seed = 5
startup_timeout = 3600.0

[selfplay]
simulations = 64
max_considered = 16
c_scale = 0.3
max_steps = 104
max_candidates = 2303
length_tiebreak = false

[wandb]
run_name = "ablate-f1-21-bc-search-trainer"

[paths]
run_dir = "runs/ablate-f1-21-bc-search-trainer"
