extends = "bases/whittle-1024-gated-benchmark.toml"

# Run: clean-arena-1m
# Purpose: long benchmark run for the 1024-action exphormer
# pointer/pair/tanh model against the shared gated-policy arena.

[arch]
subject_encoding = "mean"

[trainer]
total_steps = 1000000
publish_interval = 256
ema_decay = 0.0
max_reuse = 0.0
value_mirror = true

[selfplay]
workers_per_lane = 32
gumbel_noise_overlap = -1.0
tree_reuse = false
no_backtrack = true
mask_stop = false
length_tiebreak = true
reference_ema_decay = 0.0
eval_processes = 1
position_features = false
max_steps = 64
replay_retain = 16000
admission_stagger_ms = 50000

[wandb]
run_name = "benchmark-exphormer-pointer-pair-tanh-nopos-ramp-wpl32-1m"

[paths]
run_dir = "runs/benchmark-exphormer-pointer-pair-tanh-nopos-ramp-wpl32-1m"
