extends = "../../bases/gated-pool32-legacy-screen.toml"

# Old optimizer plus clip 3 failed at batch 256; test whether batch 512 is
# sufficient without raising the clip threshold.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5
batch = 512

[wandb]
run_name = "pool32-causal-seed5-old-optimizer-batch512-1"

[paths]
run_dir = "runs/pool32-causal-seed5-old-optimizer-batch512-1"
