extends = "bases/whittle-1024-gated-benchmark.toml"

# Run: tree-reuse
# Purpose: same benchmark shape as configs/benchmark.toml, with only
# tree_reuse enabled for profiling against the fresh-tree baseline.

[arch]
subject_encoding = "mean"

[trainer]
publish_interval = 256
ema_decay = 0.0
max_reuse = 0.0
value_mirror = true

[selfplay]
gumbel_noise_overlap = -1.0
tree_reuse = true
no_backtrack = true
mask_stop = false
reference_ema_decay = 0.0
eval_processes = 1
position_features = false
max_steps = 64
replay_retain = 16000
admission_stagger_ms = 50000

[wandb]
run_name = "benchmark-exphormer-pointer-pair-tanh-nopos-ramp-reuse"

[paths]
run_dir = "runs/benchmark-exphormer-pointer-pair-tanh-nopos-ramp-reuse"
