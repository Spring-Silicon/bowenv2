extends = "../../bases/whittle-generated-exphormer-v2.toml"

[trainer]
optimizer = "muon_mixed"
lr = 0.02
adamw_lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
min_lr_ratio = 0.0
batch = 512
value_batch = 512
window_rows = 30000
value_window_rows = 30000
total_steps = 10000
publish_interval = 256
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 1.0
value_mirror = false
compile_model = true
matmul_precision = "high"
max_reuse = 8.0
parallel_value_sampling = true
init_checkpoint = "runs/distill-generated-reducing-uniform-v2-s5-1k-1/checkpoints"
init_checkpoint_scope = "policy"

[selfplay]
policy_opponent_mode = "sampled-tree"
reference_gamma = 0.0
length_tiebreak = false
max_batch = 128
reference_max_batch = 128
replay_retain = 48000

[wandb]
run_name = "gz-graph-v2-sampled-tree-muon-s42-10k-1"

[paths]
run_dir = "runs/gz-graph-v2-sampled-tree-muon-s42-10k-1"
replay_dir = "/opt/dlami/nvme/graphzero-replay/gz-graph-v2-sampled-tree-muon-s42-10k-1"
