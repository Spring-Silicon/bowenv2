# Immutable 5k screen baseline for the steady-arena throughput ablations.
# Every experiment leaf changes one conceptual factor and supplies its own
# run name/path. Do not edit this base after the overnight queue starts.

[arch]
name = "gz-graph-v1"
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
activation = "gelu"
aggregation = "attention"
global_tokens = 1
trunk = "exphormer"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"
subject_encoding = "mean"
position_encoding = "shared"
action_encoding = "kind_prior"
profile = "graphzero"
value_hidden = 0

[trainer]
optimizer = "adamw"
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
min_lr_ratio = 0.0
batch = 256
value_batch = 0
window_rows = 10000
value_window_rows = 0
total_steps = 5000
publish_interval = 256
publish_lag_blocks = 0
value_weight = 1.0
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 1000
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
min_available_gb = 40.0
prefetch = true
max_reuse = 8.0
reuse_gate_interval = 1
reuse_gate_episodes = 0
value_mirror = true
resume = false

[selfplay]
lanes = 44
workers_per_lane = 32
simulations = 48
max_considered = 8
gumbel_scale = 1.0
c_visit = 50.0
c_scale = 1.0
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 64
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.0
reference_gamma = 0.2
max_row_backlog = 1000000
replay_retain = 16000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"
position_features = false
no_backtrack = true
mask_stop = false
length_tiebreak = true
eval_processes = 1
admission_stagger_ms = 1600

[wandb]
project = "graphzero"
run_name = "ablation-screen-base-do-not-run"

[paths]
run_dir = "runs/ablation-screen-base-do-not-run"
graphzero_bin = "target/release/graphzero"
