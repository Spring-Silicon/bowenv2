# The no-EMA leg plus whittlezero's theta_B ratchet: the noema leg
# escaped the dead zone ~10x faster (red_ema ~0 by step 1000 vs -90 at
# 5000 for the baseline) but froze in a mutual-stop stalemate -- the
# ungated "policy" reference tracks the learner back down, so when both
# stop at the root, ties coin-flip to a 50% win rate and nothing pushes
# forward. reference = "gated-policy" keeps the best measured rollout
# as a monotone bar: once any checkpoint measures a positive reduction,
# stopping at the root is a guaranteed loss and the label signal points
# forward again. Otherwise identical to whittle-1024-pub32-5k-noema
# (ema_decay 0.0, pointer+pair heads, 44x48/256, seed 42).

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
policy_head = "pointer"
value_input = "pair"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 2000
batch = 256
window_rows = 50000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-noema-gated-1"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-noema-gated"
graphzero_bin = "target/release/graphzero"
