# Immutable 5k AC base: exact WhittleZero architecture and trainer semantics
# under GraphZero's ordinary 44x32, 48-simulation, 64-step search cadence.

[arch]
name = "gz-graph-v1"
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
activation = "gelu"
aggregation = "attention"
global_tokens = 1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
warmup_steps = 0
lr_decay_steps = 800
min_lr_ratio = 0.1
batch = 512
value_batch = 256
window_rows = 10000
value_window_rows = 5000
total_steps = 5000
publish_interval = 256
publish_lag_blocks = 0
value_weight = 1.0
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 3.0
min_startup_rows = 1000
seed = 5
device = "cuda:1"
startup_timeout = 3600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
min_available_gb = 40.0
prefetch = true
max_reuse = 8.0
reuse_gate_interval = 1
reuse_gate_episodes = 0
value_mirror = true
resume = false

[selfplay]
lanes = 44
workers_per_lane = 32
simulations = 48
max_considered = 8
gumbel_scale = 1.0
c_visit = 50.0
c_scale = 1.0
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 64
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.0
reference_gamma = 0.2
max_row_backlog = 1000000
replay_retain = 16000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"
position_features = true
no_backtrack = true
mask_stop = false
length_tiebreak = true
eval_processes = 1
admission_stagger_ms = 1600

[wandb]
project = "graphzero"
run_name = "benchmark-ac-r8-screen-base-do-not-run"

[paths]
run_dir = "runs/benchmark-ac-r8-screen-base-do-not-run"
graphzero_bin = "target/release/graphzero"
