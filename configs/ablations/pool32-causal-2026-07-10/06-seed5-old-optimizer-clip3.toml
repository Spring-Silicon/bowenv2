extends = "../../bases/gated-pool32-legacy-screen.toml"

# Old optimizer was necessary in the full passing recipe but failed with
# batch 256 and clip 1; test whether clip 3 is the required interaction.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5
grad_clip = 3.0

[wandb]
run_name = "pool32-causal-seed5-old-optimizer-clip3-1"

[paths]
run_dir = "runs/pool32-causal-seed5-old-optimizer-clip3-1"
