[queue]
name = "pool32-causal-2026-07-10"
results_dir = "runs/ablation-pool32-causal-2026-07-10"
poll_seconds = 5.0
min_free_gb = 100.0
continue_on_failure = false

[[runs]]
name = "positive-control"
config = "00-positive-control.toml"
timeout_seconds = 7200
early_stop = [
  { step = 1000, window = 5, terminal_cost_mean_gt = 130.0, policy_loss_gt = 6.55 },
  { step = 1500, window = 5, terminal_cost_mean_gt = 125.0 },
]

[[runs]]
name = "seed5-only"
config = "01-seed5-only.toml"
timeout_seconds = 7200
early_stop = [
  { step = 1000, window = 5, terminal_cost_mean_gt = 130.0, policy_loss_gt = 6.55 },
  { step = 1500, window = 5, terminal_cost_mean_gt = 125.0 },
]
