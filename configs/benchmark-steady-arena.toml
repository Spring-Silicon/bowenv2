extends = "bases/whittle-1024-gated-benchmark.toml"

# Run: steady-arena
# Purpose: long benchmark with bounded data reuse and a 50-second startup
# ramp across each lane's worker cohort.

[arch]
subject_encoding = "mean"

[trainer]
total_steps = 10000
publish_interval = 256
ema_decay = 0.0
max_reuse = 8.0
value_mirror = true

[selfplay]
workers_per_lane = 32
gumbel_noise_overlap = 0.5
tree_reuse = false
no_backtrack = true
mask_stop = false
length_tiebreak = true
reference_ema_decay = 0.0
eval_processes = 1
position_features = false
max_steps = 64
replay_retain = 16000
admission_stagger_ms = 1600

[wandb]
run_name = "benchmark-steady-arena-r8-overlap05-10k"

[paths]
run_dir = "runs/benchmark-steady-arena-r8-overlap05-10k"
