extends = "../../bases/gated-pool32-legacy-screen.toml"

# New-seed replication of the minimal passing trainer.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 17
batch = 512

[wandb]
run_name = "pool32-causal-seed17-old-optimizer-batch512-1"

[paths]
run_dir = "runs/pool32-causal-seed17-old-optimizer-batch512-1"
