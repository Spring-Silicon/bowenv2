extends = "bases/gated-pool32-s42-throughput.toml"

# Exact WhittleZero-compatible architecture; all trainer, selfplay, replay,
# opponent, and runtime settings remain inherited from the GraphZero run.
[arch]
layers = 3
trunk = "sage"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[trainer]
total_steps = 10000

[wandb]
run_name = "gated-pool32-s42-legacy-10k-1"

[paths]
run_dir = "runs/gated-pool32-s42-legacy-10k"
