extends = "../bases/whittle-1024-gated-benchmark.toml"

# Treatment 02: the usual steady-arena throughput recipe with only the
# policy-visible normalized remaining-budget feature added. The value head
# remains budget-blind through position_encoding = "policy_budget".

[arch]
subject_encoding = "mean"
position_encoding = "policy_budget"

[trainer]
total_steps = 10000
publish_interval = 256
ema_decay = 0.0
max_reuse = 8.0
value_mirror = true

[selfplay]
workers_per_lane = 32
gumbel_noise_overlap = 0.5
tree_reuse = false
no_backtrack = true
mask_stop = false
length_tiebreak = true
reference_ema_decay = 0.0
eval_processes = 1
position_features = true
max_steps = 64
replay_retain = 16000
admission_stagger_ms = 1600

[wandb]
run_name = "ablate-benchmark-throughput-02-policy-budget-10k"

[paths]
run_dir = "runs/ablate-benchmark-throughput-02-policy-budget-10k"
