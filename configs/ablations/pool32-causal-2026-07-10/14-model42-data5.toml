extends = "../../bases/gated-pool32-legacy-screen.toml"

# Seed-role cross: seed-42 Torch initialization/dropout with seed-5 replay
# sampling and value orientation.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5
model_seed = 42
data_seed = 5
batch = 512
total_steps = 1500

[wandb]
run_name = "pool32-causal-model42-data5-1"

[paths]
run_dir = "runs/pool32-causal-model42-data5-1"
