# Optimizer-pack leg: pointer-pair-2's stack (pointer head, pair value,
# masked-STOP rollouts, tie coin, ungated policy reference) with
# whittlezero's regularization: weight_decay 1e-4 (was 1e-2) and no LR
# warmup (constant 3e-4 from step 1; warmup previously ate 2000 of the
# 5000 steps). Also the 44x48/256 throughput shape.

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
policy_head = "pointer"
value_input = "pair"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 50000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
weight_decay = 0.0001
ema_decay = 0.999
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-pointer-pair-wd-1"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-pointer-pair-wd"
graphzero_bin = "target/release/graphzero"
