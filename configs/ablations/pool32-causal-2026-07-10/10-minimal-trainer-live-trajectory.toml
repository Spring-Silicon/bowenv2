extends = "../../bases/live-trajectory-s42-throughput.toml"

# Hold the minimal passing trainer and legacy architecture fixed while using
# the active-policy sampled trajectory opponent from the failed live run.
[arch]
layers = 3
trunk = "sage"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5
batch = 512
total_steps = 2500

[wandb]
run_name = "pool32-causal-minimal-trainer-live-trajectory-1"

[paths]
run_dir = "runs/pool32-causal-minimal-trainer-live-trajectory-1"
