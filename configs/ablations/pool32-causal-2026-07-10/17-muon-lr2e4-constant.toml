extends = "../../bases/gated-pool32-legacy-screen.toml"

# Muon LR/decay 2x2: historical lower LR without cosine decay.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "constant"
min_lr_ratio = 0.0
seed = 5
batch = 512
total_steps = 1500

[wandb]
run_name = "pool32-causal-muon-lr2e4-constant-1"

[paths]
run_dir = "runs/pool32-causal-muon-lr2e4-constant-1"
