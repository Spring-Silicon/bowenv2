extends = "../../bases/benchmark-throughput-r8-screen.toml"

# A: exact WhittleZero model and feature architecture on generic search/training.
[arch]
layers = 3
trunk = "sage"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[selfplay]
position_features = true

[trainer]
startup_timeout = 3600.0

[wandb]
run_name = "ablate-f1-16-a-arch"

[paths]
run_dir = "runs/ablate-f1-16-a-arch"
