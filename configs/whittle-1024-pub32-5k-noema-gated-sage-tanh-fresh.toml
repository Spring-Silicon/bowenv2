# The data-freshness leg: window_rows 4000 (was 50000) and no warmup
# (constant 3e-4 from step 1; warmup previously ate 2000 of the 5000
# steps). At ~888 rows per 32-step publish, a 50k window spans ~56
# actor generations of mixed-vintage data; 4k spans ~4.5, near
# whittlezero's ~1.3-iteration window, and batch 256 from 4k matches
# their 512-from-10k sampling fraction. A/B against
# noema-gated-sage-tanh (label -0.50, terminal 112, best 97); nbt is
# deliberately NOT stacked (its learner-side regression is unverified).

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 4000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-noema-gated-sage-tanh-fresh-1"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-noema-gated-sage-tanh-fresh"
graphzero_bin = "target/release/graphzero"
