extends = "../../bases/gated-pool32-legacy-screen.toml"

# Reciprocal of the minimal passing trainer: change only trainer seed 5 -> 42.
[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
batch = 512

[wandb]
run_name = "pool32-causal-seed42-old-optimizer-batch512-1"

[paths]
run_dir = "runs/pool32-causal-seed42-old-optimizer-batch512-1"
