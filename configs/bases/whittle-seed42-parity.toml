# Base: learning-semantic parity with whittlezero's gz-seed42-single-v5d.
# Model, search, labels, replay window, optimizer, and the 32-episode actor
# cadence follow the reference run.

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
activation = "gelu"
aggregation = "attention"
global_tokens = 1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
warmup_steps = 0
lr_decay_steps = 800
min_lr_ratio = 0.1
batch = 512
value_batch = 256
window_rows = 10000
# Whittle stores both pair orientations in a separate 10k value replay,
# equivalent to the latest 5k GraphZero source rows.
value_window_rows = 5000
total_steps = 1000
publish_interval = 8
publish_lag_blocks = 1
value_weight = 1.0
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 3.0
min_startup_rows = 3328
seed = 5
device = "cuda:1"
startup_timeout = 3600.0
reconnect_limit = 5
log_interval = 8
step_sleep = 0.0
min_available_gb = 40.0
prefetch = true
# Admit one eight-step optimizer block after each 32-episode actor wave.
# Episode-count gating remains exact after policies begin stopping early.
max_reuse = 0.0
reuse_gate_interval = 8
reuse_gate_episodes = 32
value_mirror = true
resume = false

[selfplay]
# WhittleZero runs 32 native worker threads. Keep 32 concurrent episodes,
# with one tree per GraphZero lane thread rather than multiplexing all trees
# through one lane.
lanes = 32
workers_per_lane = 1
simulations = 64
max_considered = 16
gumbel_scale = 1.0
c_visit = 50.0
c_scale = 0.3
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 104
# Reference run peak: 2,256 candidates. Reserve 2,303 plus STOP so
# fixed-width GraphZero batches do not truncate any observed action set.
max_candidates = 2303
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.0
reference_gamma = 0.2
max_row_backlog = 1000000
replay_retain = 16000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
# One pending eval per tree bounds a single evaluator batch at 32 rows.
max_batch = 32
python_dir = "python"
position_features = true
no_backtrack = true
mask_stop = false
length_tiebreak = false
eval_processes = 1
admission_stagger_ms = 0

[wandb]
project = "graphzero"

[paths]
run_dir = "runs/whittle-seed42-parity-base"
graphzero_bin = "target/release/graphzero"
