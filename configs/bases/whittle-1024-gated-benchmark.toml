# Base: Whittle 1024 gated benchmark profile.
# Represents the stable operating shape: 44 lanes x 8 workers, 48
# simulations, schema-only replay initialization, fixed-root gated-policy
# reference, exphormer trunk, pointer policy, pair/tanh value head, and
# the standard CUDA layout.

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
activation = "gelu"
aggregation = "attention"
global_tokens = 1
trunk = "exphormer"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
value_activation = "tanh"
subject_encoding = "mean"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 10000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
weight_decay = 0.0001
ema_decay = 0.999
grad_clip = 1.0
min_startup_rows = 1000
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
min_available_gb = 40.0
prefetch = true
max_reuse = 0.0
value_mirror = false
resume = false

[selfplay]
lanes = 44
workers_per_lane = 8
simulations = 48
max_considered = 8
gumbel_scale = 1.0
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 128
max_candidates = 1023
reference = "gated-policy"
root_mode = "fixed"
reference_ema_decay = 0.0
reference_gamma = 0.2
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"
position_features = true
no_backtrack = false
mask_stop = false
length_tiebreak = false
eval_processes = 1

[wandb]
project = "graphzero"

[paths]
run_dir = "runs/whittle-1024-gated-benchmark-base"
graphzero_bin = "target/release/graphzero"
