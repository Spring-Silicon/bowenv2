# blind: the model sees graph + opponent only. position_features = false
# strips budget_fraction/budget_step AND root_step/leaf_depth -- with a
# fixed max_steps the step index IS remaining budget, so partial blinding
# would leak the clock. Value targets become budget-aliased by design.
# Second variable, deliberate: value_activation = tanh (whittlezero's).
# The old tanh brick was MSE-on-tanh gradient death under one-sided
# labels + the serve-side double tanh; value_mirror forces 50/50 targets
# and the double tanh is fixed, so tanh gets its fair retrial here.
# max_steps 64 keeps the forced march near the policy's basin (the noise
# dig: damage ~0.8 cost/move; final cost scored). max_reuse 8 paces the
# trainer against one eval process (~30 rows/s): ~90 min for 5k steps.

[arch]
dim = 128
layers = 3
heads = 4
ffn_dim = 512
dropout = 0.1
trunk = "sage"
sage_layers = 3
policy_head = "pointer"
value_input = "pair"
subject_encoding = "match"
value_activation = "tanh"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 0
batch = 256
window_rows = 4000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 3600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
value_mirror = true
max_reuse = 8.0

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
gumbel_noise_overlap = 0.5
tree_reuse = false
max_steps = 64
max_candidates = 1023
position_features = false
length_tiebreak = true

reference = "gated-policy"
reference_gamma = 0.2
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 16000
eval_processes = 1
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-5k-blind-1"

[paths]
run_dir = "runs/whittle-5k-blind"
graphzero_bin = "target/release/graphzero"
