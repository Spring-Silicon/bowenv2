extends = "../../bases/gated-pool32-legacy-screen.toml"

# Hold the minimal passing trainer fixed and swap only to GraphZero's native
# Exphormer architecture bundle.
[arch]
layers = 4
trunk = "exphormer"
subject_encoding = "mean"
position_encoding = "shared"
action_encoding = "kind_prior"
profile = "graphzero"
value_hidden = 512

[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
seed = 5
batch = 512

[wandb]
run_name = "pool32-causal-minimal-trainer-exphormer-1"

[paths]
run_dir = "runs/pool32-causal-minimal-trainer-exphormer-1"
