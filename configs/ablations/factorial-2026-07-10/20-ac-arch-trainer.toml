extends = "../../bases/benchmark-throughput-r8-screen.toml"

# A+C: exact WhittleZero model/trainer with generic search.
[arch]
layers = 3
trunk = "sage"
subject_encoding = "match"
position_encoding = "policy_budget"
action_encoding = "candidate_only"
profile = "whittlezero"
value_hidden = 256

[trainer]
optimizer = "muon_mixed"
lr = 0.0002
adamw_lr = 0.0002
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "cosine"
lr_decay_steps = 800
min_lr_ratio = 0.1
batch = 512
value_batch = 256
value_window_rows = 5000
grad_clip = 3.0
seed = 5
startup_timeout = 3600.0

[selfplay]
position_features = true

[wandb]
run_name = "ablate-f1-20-ac-arch-trainer"

[paths]
run_dir = "runs/ablate-f1-20-ac-arch-trainer"
