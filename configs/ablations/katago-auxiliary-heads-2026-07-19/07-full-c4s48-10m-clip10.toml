extends = "../../bases/whittle-generated-exphormer-v2-symmetric-selfplay.toml"

[arch]
dim = 256
layers = 5
heads = 8
ffn_dim = 896
auxiliary_heads = "v8-v32-score"

[trainer]
total_steps = 20000
value_batch = 512
value_window_rows = 300000
value_trunk_grad_scale = 0.1
value_final_weight = 0.5
value_v8_weight = 0.2
value_v32_weight = 0.2
terminal_score_weight = 0.1
weight_decay = 0.0001
grad_clip = 10.0
permanent_checkpoint_interval = 1000
model_seed = 5
data_seed = 42

[selfplay]
root_mode = "generated"
lanes = 44
workers_per_lane = 4
simulations = 48
max_considered = 4
max_steps = 96
seed = 42
mask_stop = false
length_tiebreak = true
wave_batching = true
tree_reuse = true
replay_retain = 320000

[wandb]
run_name = "whittle-sym-gen-s42-m5-l96-w4-10m-reuse-on-vw300k-vtg0p1-c4s48-aux-v8-v32-score-clip10-20k-1"

[paths]
run_dir = "runs/sym10m-s42m5-l96w4-r1-vw300k-vtg0p1-c4s48-aux-v8v32score-clip10-20k-1"
replay_dir = "/opt/dlami/nvme/graphzero-replay/sym10m-s42m5-l96w4-r1-vw300k-vtg0p1-c4s48-aux-v8v32score-clip10-20k-1"
sample_socket = "/tmp/gz-kaux-10m-clip10.sock"
