[arch]
name = "gz-graph-v2"
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
activation = "gelu"
aggregation = "attention"
global_tokens = 1
state_input = "joint-board"
trunk = "exphormer"
sage_layers = 3
policy_head = "pointer"
value_input = "single"
value_activation = "tanh"
subject_encoding = "mean"
position_encoding = "remaining_budget"
action_encoding = "kind_prior"
profile = "graphzero"
value_hidden = 0
value_head = "scalar"
value_bins = 101
value_min = -1.0
value_max = 1.0
value_sigma_ratio = 0.75
auxiliary_heads = "v8-v32-score"

[trainer]
optimizer = "adamw"
total_steps = 20000
resume = false
lr = 0.0002
adamw_lr = 0.0002
lr_schedule = "constant"
warmup_steps = 0
min_lr_ratio = 0.0
batch = 512
value_batch = 512
window_rows = 30000
value_window_rows = 300000
publish_interval = 8
checkpoint_retain = 16
publish_lag_blocks = 0
value_weight = 1.0
value_trunk_grad_scale = 0.1
value_final_weight = 0.5
value_v8_weight = 0.2
value_v32_weight = 0.2
terminal_score_weight = 0.1
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 10.0
permanent_checkpoint_interval = 1000
min_startup_rows = 1000
seed = 42
model_seed = 5
data_seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
min_available_gb = 40.0
prefetch = true
parallel_value_sampling = true
compile_model = true
compile_mode = "default"
matmul_precision = "high"
max_reuse = 8.0
reuse_gate_interval = 1
reuse_gate_episodes = 0
init_checkpoint = ""
init_checkpoint_scope = "all"

[selfplay]
lanes = 44
workers_per_lane = 4
simulations = 48
max_considered = 4
gumbel_scale = 1.0
c_visit = 50.0
c_scale = 1.0
gumbel_noise_overlap = 0.5
