# The EMA-lag experiment: whittle-1024-pub32-5k with ema_decay 0.0, so
# every publish ships the raw learner weights instead of a 0.999 EMA
# (~1000-step trailing average). whittlezero publishes raw weights with
# ~8-step lag and needs ~100 actor generations to converge; at EMA
# horizon 1000 a 5k-step run is only ~5 generations, which matches the
# 5k ladder's dead zone. If actor lag is the binding constraint, this
# leg should wake up well before the baseline's ~10k-step crossing.
# Otherwise identical to whittle-1024-pub32-5k-1 (seed 42) except the
# adopted throughput shape (44x48 lanes/workers, eval batch 256), the
# pointer policy head (whittlezero's tsp_pointer port), and the pair
# value head (self + opponent graph, randomized train-time flip).

[arch]
dim = 128
layers = 4
heads = 4
ffn_dim = 512
dropout = 0.1
policy_head = "pointer"
value_input = "pair"

[trainer]
lr = 0.0003
lr_schedule = "constant"
warmup_steps = 2000
batch = 256
window_rows = 50000
total_steps = 5000
publish_interval = 32
value_weight = 1.0
ema_decay = 0.0
grad_clip = 1.0
min_startup_rows = 8192
seed = 42
device = "cuda:1"
startup_timeout = 600.0
reconnect_limit = 5
log_interval = 10
step_sleep = 0.0
bootstrap_episodes = 128

[selfplay]
lanes = 44
workers_per_lane = 48
simulations = 48
max_considered = 8
gumbel_scale = 1.0
max_steps = 128
max_candidates = 1023
reference = "policy"
root_mode = "fixed"
reference_ema_decay = 0.99
max_row_backlog = 1000000
replay_retain = 150000
eval_device = "cuda:0"
eval_poll_interval = 2.0
seed = 42
max_batch = 256
python_dir = "python"

[wandb]
project = "graphzero"
run_name = "whittle-1024-pub32-5k-noema-4"

[paths]
run_dir = "runs/whittle-1024-pub32-5k-noema"
graphzero_bin = "target/release/graphzero"
