extends = "../../bases/whittle-generated-exphormer.toml"

[trainer]
optimizer = "adamw"
lr = 0.0002
adamw_lr = 0.0002
lr_schedule = "constant"
warmup_steps = 0
min_lr_ratio = 0.0
batch = 512
value_batch = 512
window_rows = 30000
value_window_rows = 30000
total_steps = 10000
publish_interval = 256
weight_decay = 0.0001
ema_decay = 0.0
grad_clip = 1.0
value_mirror = false
compile_model = true
