extends = "../../bases/gated-pool32-legacy-screen.toml"

# Optimizer/schedule 2x2: Muon mixed with the modern LR schedule.
[trainer]
optimizer = "muon_mixed"
lr = 0.0003
adamw_lr = 0.0003
momentum = 0.95
nesterov = true
ns_steps = 5
lr_schedule = "constant"
min_lr_ratio = 0.0
seed = 5
batch = 512
total_steps = 1500

[wandb]
run_name = "pool32-causal-muon-modern-schedule-1"

[paths]
run_dir = "runs/pool32-causal-muon-modern-schedule-1"
