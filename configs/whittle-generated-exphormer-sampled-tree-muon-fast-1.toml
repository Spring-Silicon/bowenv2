extends = "bases/whittle-generated-exphormer.toml"

[trainer]
optimizer = "muon_mixed"
adamw_lr = 0.0003
momentum = 0.95
nesterov = true
ns_steps = 5
matmul_precision = "high"
value_batch = 512
value_window_rows = 30000
value_mirror = false

[selfplay]
policy_opponent_mode = "sampled-tree"
reference_gamma = 0.0
length_tiebreak = false
max_batch = 128

[wandb]
run_name = "whittle-generated-exphormer-sampled-tree-muon-fast-1"

[paths]
run_dir = "runs/whittle-generated-exphormer-sampled-tree-muon-fast-1"
